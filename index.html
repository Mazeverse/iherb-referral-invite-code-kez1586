<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>아이허브 추천인 추천코드 KEZ1586</title>
    <meta name="description" content="아이허브 추천인 추천코드 KEZ1586을 확인하고 복사할 수 있는 간단한 안내 페이지입니다.">

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="BtBII3918J1J9BnNiNfjVaPn0QXfIj5xoi1G_8qtFk4" />

    <!-- Naver -->
    <meta name="naver-site-verification" content="f28f86b7853e4f6704297b86d7def790b41e00e4" />

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .code {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #2ecc71;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        .desc {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

    </style>
</head>

<body>

<div class="card">
    <h1>아이허브 추천인 추천코드</h1>

    <div class="code" id="code">KEZ1586</div>

    <button onclick="copyCode()">코드 복사하기</button>

    <div class="desc">
        아이허브 추천인 추천코드를 복사하고 할인 혜택을 받아보세요.
    </div>
</div>

<script>
function copyCode() {
    const code = document.getElementById("code").innerText;
    navigator.clipboard.writeText(code);
    alert("추천코드가 복사되었습니다!");
}
</script>

</body>
</html>
